server.port=5000
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

spring.mvc.static-path-pattern=/static/**
spring.web.resources.static-locations=classpath:/static/

logging.level.com.nmdc=INFO
logging.level.org.springframework.web=INFO

spring.application.name=nmdc-hr-analytics

# ─── NMDC application paths ──────────────────────────────────────────────
# All paths are resolved relative to the working directory the app is
# launched from (i.e. the project root, same as app.py's BASE_DIR.parent).
nmdc.users-file=Users.xlsx
nmdc.login-page=nmdc_login.html
nmdc.frontend-dir=frontend
nmdc.logo-path=NMDC LOGO.jpg
